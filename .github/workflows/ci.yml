name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: this workflow only needs to read repo
# contents (checkout). Deploy/publish steps use their own scoped secrets.
permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race -count=1 ./...
